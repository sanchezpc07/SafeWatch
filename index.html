<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SafeWatch Guardian</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/jpeg" href="img/logo.jpg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="login-container">
    <div class="card login-card" style="text-align: center;">
      <img src="img/logo.jpg" alt="SafeWatch Logo"
        style="width: 120px; height: 120px; border-radius: 20px; margin-bottom: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
      <h2 style="margin-bottom: 0.5rem;">SafeWatch Guardian</h2>
      <p style="margin-bottom: 1.5rem;">Asistente Inteligente para Adultos Mayores</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Iniciar Sesión</button>
      </form>
      <div id="loginError" style="color: var(--accent); margin-top: 1rem; text-align: center; display: none;">
        Credenciales incorrectas
      </div>
    </div>
  </div>

  <footer
    style="margin-top: 4rem; padding: 2rem 0; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.01);">
    <img src="img/logo.jpg" alt="SafeWatch Logo"
      style="width: 40px; height: 40px; border-radius: 8px; margin-bottom: 0.5rem; filter: grayscale(0.2);">
    <div style="font-weight: 600; color: #1e293b; font-size: 0.9rem;">SafeWatch Guardian</div>
    <p style="color: #64748b; font-size: 0.75rem; margin-top: 0.25rem;">© 2026 Inteligencia Artificial para el cuidado
      domiciliario</p>
  </footer>

  <script src="js/auth.js"></script>
</body>

</html>
